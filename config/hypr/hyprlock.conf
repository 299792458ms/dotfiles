general {
    ignore_empty_input = true
    no_fade_in = true
    no_fade_out = false
    hide_cursor = true
}

background {
    monitor =
    path = ~/wallpapers/002.png
    blur_passes = 0
}

label {
    monitor =
    text = <br/>  󰌾<br/>$TIME<br/>
    color = rgb(d8dee9)
    font_size = 25
    font_family = Jet Brains Mono Nerd Font
    rotate = 0
    position = 0, 80
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 170, 30
    outline_thickness = 2
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    dots_rounding = -1
    outer_color = rgb(d8dee9)
    inner_color = rgba(46,52,64,1)
    font_color = rgb(d8dee9)
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text =
    hide_input = false
    rounding = -1
    check_color = rgb(ebcb9b)
    fail_color = rgb(191,97,106)
    fail_text =
    fail_transition = 200
    capslock_color = -1
    numlock_color = -1
    bothlock_color = -1
    invert_numlock = false
    swap_font_color = false
    position = 0, 0
    halign = center
    valign = center
}


