# This file should be put in /usr/share/sddm/themes/<your_nord_theme_directoy_name> and then set the current theme to <your_nord_theme_directoy_name> in /etc/sddm.conf/
# you should install sugar-candy -or any theme based on this one for it to work or just replace the theme's config file for this(which will ruin the installed theme obviously

[General]
Background=""
DimBackgroundImage="0.0"
ScaleImageCropped="true"
ScreenWidth="1920"
ScreenHeight="1080"

## [Blur Settings]
FullBlur="false"
PartialBlur="false"
BlurRadius="0"

## [Design Customizations]
HaveFormBackground="true"
FormPosition="center"
BackgroundImageHAlignment="right"
BackgroundImageVAlignment="center"
MainColor="#D8DEE9"
AccentColor="#81A1C1"
BackgroundColor="#2E3440"
OverrideLoginButtonTextColor="#16161E"
InterfaceShadowSize="6"
InterfaceShadowOpacity="0.6"
RoundCorners="20"
ScreenPadding="0"
Font="JetBrainsMono Nerd Font"
FontSize=""
HeaderText="󰣇"

## [Interface Behavior]
ForceRightToLeft="false"
ForceLastUser="true"
ForcePasswordFocus="true"
ForceHideCompletePassword="true"
ForceHideVirtualKeyboardButton="false"
ForceHideSystemButtons="false"
AllowEmptyPassword="false"
AllowBadUsernames="false"

## [Locale Settings]
Locale=""
HourFormat="hh:mm:ss"
DateFormat="yyyy-MM-dd"


## [Translations]
TranslatePlaceholderUsername=""
TranslatePlaceholderPassword=""
TranslateShowPassword=""
TranslateLogin=""
TranslateLoginFailedWarning=""
TranslateCapslockWarning=""
